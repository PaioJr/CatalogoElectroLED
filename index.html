<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Electro LED</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 p-5 text-white">
    <header class="text-center mb-10">
<header class="text-center mb-10">
    <img src="https://i.postimg.cc/tgsKp9dP/e6aeb6dd-6335-4fce-b702-2ec8b3ed3e0e.png" 
         alt="Logo Electro LED" 
         style="height: 200px;" 
         class="mb-4 object-contain mx-auto">
    <p class="text-gray-300 font-semibold text-lg">Domótica e Iluminación - San Juan</p>
</header>

    <div id="catalogo" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
        </div>

    <script src="productos.js"></script>
    <script>
        const contenedor = document.getElementById('catalogo');
        productos.forEach(p => {
            contenedor.innerHTML += `
                <div class="bg-white rounded-lg shadow-md overflow-hidden p-4 border-b-4 border-blue-500">
                    <img src="${p.imagen}" class="w-full h-48 object-cover rounded bg-gray-200" alt="${p.nombre}">
                    <div class="mt-2">
                        <span class="text-xs font-bold text-blue-500 uppercase">${p.categoria}</span>
                        <h2 class="text-xl font-bold">${p.nombre}</h2>
                        <p class="text-gray-500 text-sm mt-1">${p.descripcion}</p>
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-2xl font-bold text-green-600">$${p.precio}</span>
                        <a href="https://wa.me/5492645725220?text=Hola! Quiero info de: ${p.nombre}" 
                           target="_blank"
                           class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-green-600">
                           Consultar
                        </a>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
